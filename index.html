<!DOCTYPE html>
<html>
<head>
<title>CMS Store</title>
<style>
body{font-family:Arial;background:linear-gradient(#89f7fe,#66a6ff);text-align:center}
.store{background:#fff;padding:20px;border-radius:10px;width:320px;margin:auto}
.item{border:1px solid #ddd;margin:10px;padding:10px}
img{width:100px}
button{background:#28a745;color:#fff;border:none;padding:6px 10px}
</style>
</head>

<body>

<div class="store">
<h2>My CMS Store</h2>

<select>
<option>Electronics</option>
<option>Clothes</option>
<option>Food</option>
</select>

<div class="item">
<img src="https://via.placeholder.com/100">
<p>Product 1</p>
<p>$20</p>
<button onclick="buy()">Buy</button>
</div>

<div class="item">
<img src="https://via.placeholder.com/100">
<p>Product 2</p>
<p>$35</p>
<button onclick="buy()">Buy</button>
</div>

</div>

<script>
function buy(){alert("Purchase Successful")}
</script>

</body>
</html>
